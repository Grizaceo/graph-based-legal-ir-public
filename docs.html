<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexCon Docs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="base.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44' fill='none'><circle cx='22' cy='22' r='18' stroke='%237170ff' stroke-width='2.5' stroke-dasharray='2 4' opacity='0.5'/><circle cx='22' cy='22' r='7' fill='%235e6ad2'/><path d='M22 17V4M22 27V40M17 22H4M27 22H40' stroke='%237170ff' stroke-width='3' stroke-linecap='round'/></svg>">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .logo-svg {
            vertical-align: middle;
            margin-top: -4px;
            filter: drop-shadow(0 0 10px rgba(94, 106, 210, 0.5));
        }
        .header-mini {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0;
            margin-bottom: 64px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .header-mini strong {
            font-size: 32px;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #content {
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.7;
        }
        pre {
            background: #0f1115;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border-subtle);
        }
        code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }
        h1, h2, h3 { color: var(--text-primary); margin-top: 40px; }
        p, li { color: var(--text-secondary); }
        .lang-toggle {
            display: flex;
            gap: 4px;
        }
        .lang-toggle button {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-std);
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            transition: all 0.15s;
        }
        .lang-toggle button.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .lang-toggle button:not(.active):hover {
            border-color: var(--accent);
            color: var(--accent-glow);
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="header-mini">
            <a href="index.html" style="text-decoration: none; color: inherit;">
                <strong>LEX<svg class="logo-svg" width="44" height="44" viewBox="0 0 44 44" fill="none">
                    <circle cx="22" cy="22" r="18" stroke="currentColor" stroke-width="2.5" stroke-dasharray="2 4" opacity="0.5"/>
                    <circle cx="22" cy="22" r="7" fill="#5e6ad2"/>
                    <path d="M22 17V4M22 27V40M17 22H4M27 22H40" stroke="#7170ff" stroke-width="3" stroke-linecap="round"/>
                </svg> CON</strong>
            </a>
            <div style="display:flex; gap:16px; align-items:center;">
                <div class="lang-toggle">
                    <button data-lang="en" class="active" onclick="setLang('en')">EN</button>
                    <button data-lang="es" onclick="setLang('es')">ES</button>
                </div>
                <a href="index.html" class="btn btn-ghost" style="font-size: 14px; padding: 10px 20px;" data-i18n="back-link">← Back</a>
            </div>
        </div>
        
        <div id="content" data-i18n="loading"><em>Loading documentation...</em></div>
    </div>

    <script>
        const I18N = {
            en: { 'back-link': '← Back', 'loading': '<em>Loading documentation...</em>', 'error': 'Error loading document: ' },
            es: { 'back-link': '← Volver', 'loading': '<em>Cargando documentación...</em>', 'error': 'Error al cargar el documento: ' }
        };

        let currentLang = 'en';
        const params = new URLSearchParams(window.location.search);
        const page = params.get('page') || 'docs/architecture.md';

        function loadDoc(lang) {
            const pageSuffix = lang === 'es' ? '.es.md' : '.md';
            const pageClean = page.replace(/\.md$/, '').replace(/\.es\.md$/, '');
            const fullPath = pageClean + pageSuffix;
            
            document.getElementById('content').innerHTML = I18N[lang]['loading'];

            fetch(fullPath)
                .then(response => {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.text();
                })
                .then(text => {
                    document.getElementById('content').innerHTML = marked.parse(text);
                })
                .catch(err => {
                    // Fallback to EN version
                    if (lang === 'es') {
                        const enPath = pageClean + '.md';
                        fetch(enPath)
                            .then(r => r.text())
                            .then(text => {
                                document.getElementById('content').innerHTML = marked.parse(text);
                            })
                            .catch(err2 => {
                                document.getElementById('content').innerHTML = I18N[lang]['error'] + (err2.message || err.message);
                            });
                    } else {
                        document.getElementById('content').innerHTML = I18N[lang]['error'] + err.message;
                    }
                });
        }

        function setLang(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            document.querySelectorAll('.lang-toggle button').forEach(b => {
                b.classList.toggle('active', b.getAttribute('data-lang') === lang);
            });
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (I18N[lang] && I18N[lang][key]) el.innerHTML = I18N[lang][key];
            });
            loadDoc(lang);
            try { localStorage.setItem('lexcon-lang', lang); } catch(e) {}
        }

        // Restore saved language
        (function() {
            const saved = localStorage.getItem('lexcon-lang');
            if (saved === 'es') {
                setLang('es');
            } else {
                loadDoc('en');
            }
        })();
    </script>
</body>
</html>
