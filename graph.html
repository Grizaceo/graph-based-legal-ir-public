<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexCon · Graphium — Labor Law Citation Graph</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44' fill='none'><circle cx='22' cy='22' r='18' stroke='%237170ff' stroke-width='2.5' stroke-dasharray='2 4' opacity='0.5'/><circle cx='22' cy='22' r='7' fill='%235e6ad2'/><path d='M22 17V4M22 27V40M17 22H4M27 22H40' stroke='%237170ff' stroke-width='3' stroke-linecap='round'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>
  <style>
    :root {
      --bg: #010102;
      --bg-panel: rgba(10,10,18,0.88);
      --bg-card: rgba(20,20,30,0.92);
      --text-primary: #f7f8f8;
      --text-secondary: #d0d6e0;
      --text-tertiary: #8a8f98;
      --accent: #5e6ad2;
      --accent-glow: #7170ff;
      --border-subtle: rgba(255,255,255,0.06);
      --border-std: rgba(255,255,255,0.1);
      --c-ley: #ba68c8;
      --c-articulo: #ce93d8;
      --c-judicial: #e57373;
      --c-contains: rgba(186,104,200,0.35);
      --c-applies: rgba(229,115,115,0.45);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Inter', system-ui, sans-serif; color: var(--text-primary); -webkit-font-smoothing: antialiased; }

    #graph-canvas { width: 100vw; height: 100vh; display: block; }

    /* ── Top bar ── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 40;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      background: linear-gradient(to bottom, rgba(1,1,2,0.95) 60%, transparent);
      pointer-events: none;
    }
    #topbar > * { pointer-events: auto; }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
    .brand svg { width: 28px; height: 28px; filter: drop-shadow(0 0 6px rgba(113,112,255,0.5)); }
    .brand-name { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
    .brand-sep { color: var(--text-tertiary); margin: 0 6px; }
    .brand-sub { font-size: 14px; font-weight: 400; color: var(--text-tertiary); }
    #stats-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text-tertiary);
      background: var(--bg-panel);
      border: 1px solid var(--border-std);
      border-radius: 20px;
      padding: 5px 14px;
      backdrop-filter: blur(12px);
    }
    .back-btn {
      font-size: 13px; color: var(--text-secondary);
      background: var(--bg-panel);
      border: 1px solid var(--border-std);
      border-radius: 8px; padding: 7px 16px;
      text-decoration: none;
      backdrop-filter: blur(12px);
      transition: border-color 0.15s, color 0.15s;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent-glow); }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--bg); gap: 20px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(113,112,255,0.2);
      border-top-color: var(--accent-glow);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { font-size: 14px; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; }

    /* ── Left sidebar ── */
    #sidebar {
      position: fixed; left: 16px; top: 70px; bottom: 16px; z-index: 30;
      width: 200px;
      background: var(--bg-panel);
      border: 1px solid var(--border-std);
      border-radius: 12px;
      backdrop-filter: blur(16px);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 16px 10px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-tertiary);
      border-bottom: 1px solid var(--border-subtle);
    }
    .sidebar-section { padding: 12px 14px; border-bottom: 1px solid var(--border-subtle); }
    .sidebar-section-title { font-size: 10px; color: var(--text-tertiary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
    .type-toggle {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px; cursor: pointer; user-select: none;
    }
    .type-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .type-label { font-size: 12px; color: var(--text-secondary); flex: 1; }
    .type-count { font-size: 11px; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; }
    .type-toggle input { display: none; }
    .type-toggle.dimmed .type-label { color: var(--text-tertiary); opacity: 0.5; }
    .type-toggle.dimmed .type-dot { opacity: 0.25; }

    .edge-legend { display: flex; flex-direction: column; gap: 8px; }
    .edge-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); }
    .edge-line { height: 2px; width: 22px; border-radius: 1px; flex-shrink: 0; }

    .sidebar-footer {
      margin-top: auto; padding: 12px 14px;
      font-size: 11px; color: var(--text-tertiary); line-height: 1.4;
      border-top: 1px solid var(--border-subtle);
    }
    .disclaimer-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #facc15; margin-right: 5px; vertical-align: middle; }

    /* ── Detail panel ── */
    #detail {
      position: fixed; right: -360px; top: 64px; bottom: 16px; z-index: 30;
      width: 340px;
      background: var(--bg-panel);
      border: 1px solid var(--border-std);
      border-radius: 12px;
      backdrop-filter: blur(16px);
      transition: right 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #detail.open { right: 16px; }
    #detail-header {
      padding: 16px; border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
    }
    #detail-title { font-size: 14px; font-weight: 600; line-height: 1.4; color: var(--text-primary); flex: 1; }
    #detail-close {
      width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--border-std);
      background: transparent; color: var(--text-tertiary); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: border-color 0.15s;
    }
    #detail-close:hover { border-color: var(--accent); color: var(--accent-glow); }
    #detail-type-badge {
      margin: 0 16px 12px;
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      background: rgba(94,106,210,0.12); border: 1px solid rgba(94,106,210,0.25); color: var(--accent-glow);
    }
    #detail-body { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
    .detail-field { margin-bottom: 14px; }
    .detail-field-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); margin-bottom: 4px; }
    .detail-field-value { font-size: 13px; color: var(--text-secondary); word-break: break-word; }
    .detail-field-value.mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
    .detail-field-value.big { font-size: 20px; font-weight: 600; color: var(--text-primary); }
    .neighbor-list { display: flex; flex-direction: column; gap: 4px; }
    .neighbor-chip {
      font-size: 11px; padding: 4px 8px; border-radius: 6px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border-subtle);
      color: var(--text-tertiary); cursor: pointer; transition: border-color 0.15s, color 0.15s;
      text-align: left;
    }
    .neighbor-chip:hover { border-color: var(--accent); color: var(--text-primary); }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed; z-index: 60; pointer-events: none;
      background: var(--bg-card);
      border: 1px solid var(--border-std);
      border-radius: 8px; padding: 10px 14px;
      backdrop-filter: blur(16px);
      max-width: 260px;
      display: none;
    }
    .tt-name { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
    .tt-type { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-tertiary); }
    .tt-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
    .tt-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

    /* ── Scrollbar ── */
    #detail-body::-webkit-scrollbar { width: 4px; }
    #detail-body::-webkit-scrollbar-track { background: transparent; }
    #detail-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div id="loading-text">Cargando grafo UMJ · Derecho Laboral…</div>
</div>

<!-- Canvas -->
<div id="graph-canvas"></div>

<!-- Top bar -->
<div id="topbar">
  <a href="index.html" class="brand">
    <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="22" cy="22" r="18" stroke="#7170ff" stroke-width="2.5" stroke-dasharray="2 4" opacity="0.5"/>
      <circle cx="22" cy="22" r="7" fill="#5e6ad2"/>
      <path d="M22 17V4M22 27V40M17 22H4M27 22H40" stroke="#7170ff" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <strong class="brand-name">LexCon</strong>
    <span class="brand-sep">·</span>
    <span class="brand-sub">Graphium</span>
  </a>
  <div id="stats-pill">— nodos · — aristas · Derecho Laboral</div>
  <a href="index.html" class="back-btn">← Volver</a>
</div>

<!-- Left sidebar -->
<div id="sidebar">
  <div class="sidebar-header">Visualización</div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">Tipos de nodo</div>
    <label class="type-toggle" data-type="ley">
      <input type="checkbox" checked>
      <div class="type-dot" style="background:var(--c-ley)"></div>
      <span class="type-label">Ley / Código</span>
      <span class="type-count" id="cnt-ley">—</span>
    </label>
    <label class="type-toggle" data-type="articulo">
      <input type="checkbox" checked>
      <div class="type-dot" style="background:var(--c-articulo)"></div>
      <span class="type-label">Artículo</span>
      <span class="type-count" id="cnt-articulo">—</span>
    </label>
    <label class="type-toggle" data-type="judicial">
      <input type="checkbox" checked>
      <div class="type-dot" style="background:var(--c-judicial)"></div>
      <span class="type-label">Jurisprudencia</span>
      <span class="type-count" id="cnt-judicial">—</span>
    </label>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">Tipos de arista</div>
    <div class="edge-legend">
      <div class="edge-row">
        <div class="edge-line" style="background:var(--c-ley)"></div>
        <span>contiene artículo</span>
      </div>
      <div class="edge-row">
        <div class="edge-line" style="background:var(--c-judicial)"></div>
        <span>cita / aplica</span>
      </div>
    </div>
  </div>

  <div class="sidebar-footer">
    <span class="disclaimer-dot"></span>
    Datos exploratorios. No constituyen asesoría legal. Fuente: corpus UMJ laboral.
  </div>
</div>

<!-- Right detail panel -->
<div id="detail">
  <div id="detail-header">
    <div id="detail-title">—</div>
    <button id="detail-close">×</button>
  </div>
  <div id="detail-type-badge">—</div>
  <div id="detail-body"></div>
</div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-type" id="tt-type"></div>
  <div class="tt-meta" id="tt-meta"></div>
</div>

<script>
(async () => {
  const NODE_COLORS = { ley: '#ba68c8', articulo: '#ce93d8', judicial: '#e57373' };
  const EDGE_COLORS = { contains: 'rgba(186,104,200,0.4)', applies: 'rgba(229,115,115,0.5)', default: 'rgba(255,255,255,0.15)' };
  const TYPE_LABELS = { ley: 'Ley / Código', articulo: 'Artículo', judicial: 'Jurisprudencia' };

  // State
  let graphData = null;
  let hiddenTypes = new Set();
  let fg = null;

  // Load data
  document.getElementById('loading-text').textContent = 'Cargando grafo UMJ · Derecho Laboral…';
  try {
    const res = await fetch('./graph-data/umj-laboral.json');
    graphData = await res.json();
  } catch (e) {
    document.getElementById('loading-text').textContent = 'Error cargando datos: ' + e.message;
    return;
  }

  // Update stats
  const nCount = graphData.nodes.length;
  const eCount = graphData.edges.length;
  document.getElementById('stats-pill').textContent =
    `${nCount} nodos · ${eCount} aristas · Derecho Laboral`;

  // Count by type
  const typeCounts = {};
  for (const n of graphData.nodes) typeCounts[n.type] = (typeCounts[n.type] || 0) + 1;
  for (const [t, c] of Object.entries(typeCounts)) {
    const el = document.getElementById('cnt-' + t);
    if (el) el.textContent = c;
  }

  // Build graph
  const container = document.getElementById('graph-canvas');

  fg = ForceGraph3D()(container)
    .backgroundColor('#010102')
    .width(window.innerWidth)
    .height(window.innerHeight)
    .nodeId('id')
    .nodeLabel(() => '')
    .nodeColor(n => NODE_COLORS[n.type] || '#90a4ae')
    .nodeVal(n => {
      if (n.type === 'ley') return 12;
      if (n.type === 'judicial') return Math.max(2, Math.min(6, 1 + (n.citationCount || 0) * 0.1));
      return 3;
    })
    .nodeOpacity(0.9)
    .linkSource('source')
    .linkTarget('target')
    .linkColor(l => EDGE_COLORS[l.type] || EDGE_COLORS.default)
    .linkWidth(l => l.type === 'contains' ? 0.8 : 1.2)
    .linkDirectionalParticles(l => l.type === 'applies' ? 2 : 0)
    .linkDirectionalParticleSpeed(0.004)
    .linkDirectionalParticleWidth(1.5)
    .nodeVisibility(n => !hiddenTypes.has(n.type))
    .linkVisibility(l => {
      const src = typeof l.source === 'object' ? l.source : graphData.nodes.find(n => n.id === l.source);
      const tgt = typeof l.target === 'object' ? l.target : graphData.nodes.find(n => n.id === l.target);
      if (!src || !tgt) return false;
      return !hiddenTypes.has(src.type) && !hiddenTypes.has(tgt.type);
    })
    .graphData({ nodes: graphData.nodes, links: graphData.edges.map(e => ({ ...e })) });

  // Warm up simulation briefly
  fg.d3Force('charge').strength(-120);

  // Tooltip
  const tooltip = document.getElementById('tooltip');
  const ttName = document.getElementById('tt-name');
  const ttType = document.getElementById('tt-type');
  const ttMeta = document.getElementById('tt-meta');

  fg.onNodeHover(node => {
    if (!node) { tooltip.style.display = 'none'; return; }
    ttName.textContent = node.name || node.label || node.id;
    const typeLabel = TYPE_LABELS[node.type] || node.type;
    ttName.innerHTML = `<span class="tt-dot" style="background:${NODE_COLORS[node.type] || '#90a4ae'}"></span>${node.name || node.label || node.id}`;
    ttType.textContent = typeLabel;
    const parts = [];
    if (node.citationCount) parts.push(`${node.citationCount} citas`);
    if (node.articleCount) parts.push(`${node.articleCount} artículos`);
    if (node.lawSlug) parts.push(node.lawSlug.replace(/_/g, ' ').toLowerCase());
    ttMeta.textContent = parts.join(' · ');
    tooltip.style.display = 'block';
    container.style.cursor = 'pointer';
  });

  document.addEventListener('mousemove', e => {
    if (tooltip.style.display === 'none') return;
    const x = e.clientX + 16;
    const y = e.clientY - 10;
    tooltip.style.left = Math.min(x, window.innerWidth - 280) + 'px';
    tooltip.style.top = Math.max(y, 8) + 'px';
  });

  // Detail panel
  const detail = document.getElementById('detail');
  const detailTitle = document.getElementById('detail-title');
  const detailBadge = document.getElementById('detail-type-badge');
  const detailBody = document.getElementById('detail-body');
  document.getElementById('detail-close').onclick = () => detail.classList.remove('open');

  function openDetail(node) {
    detailTitle.textContent = node.name || node.label || node.id;
    const typeLabel = TYPE_LABELS[node.type] || node.type;
    const c = NODE_COLORS[node.type] || '#90a4ae';
    detailBadge.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${c};display:inline-block"></span> ${typeLabel}`;
    detailBadge.style.background = `${c}18`;
    detailBadge.style.borderColor = `${c}40`;
    detailBadge.style.color = c;

    const fields = [];
    if (node.citationCount) fields.push({ label: 'Citas recibidas', value: node.citationCount, cls: 'big' });
    if (node.articleCount) fields.push({ label: 'Artículos', value: node.articleCount });
    if (node.lawSlug) fields.push({ label: 'Identificador', value: node.lawSlug, cls: 'mono' });
    if (node.weight) fields.push({ label: 'Peso en grafo', value: node.weight.toFixed(2) });
    if (node.community != null) fields.push({ label: 'Comunidad', value: node.community });
    if (node.nodeCategory) fields.push({ label: 'Categoría', value: node.nodeCategory });
    fields.push({ label: 'ID', value: node.id, cls: 'mono' });

    // Neighbors
    const links = fg.graphData().links;
    const neighbors = [];
    for (const l of links) {
      const srcId = typeof l.source === 'object' ? l.source.id : l.source;
      const tgtId = typeof l.target === 'object' ? l.target.id : l.target;
      if (srcId === node.id) neighbors.push({ id: tgtId, dir: '→', type: l.type });
      else if (tgtId === node.id) neighbors.push({ id: srcId, dir: '←', type: l.type });
    }

    let html = fields.map(f =>
      `<div class="detail-field">
        <div class="detail-field-label">${f.label}</div>
        <div class="detail-field-value ${f.cls || ''}">${f.value}</div>
      </div>`
    ).join('');

    if (neighbors.length) {
      html += `<div class="detail-field">
        <div class="detail-field-label">Conexiones (${neighbors.length})</div>
        <div class="neighbor-list">
          ${neighbors.slice(0, 12).map(nb => {
            const nbNode = fg.graphData().nodes.find(n => n.id === nb.id);
            const label = nbNode ? (nbNode.name || nbNode.label || nbNode.id) : nb.id;
            return `<button class="neighbor-chip" data-id="${nb.id}">${nb.dir} ${label}</button>`;
          }).join('')}
          ${neighbors.length > 12 ? `<div style="font-size:11px;color:var(--text-tertiary);padding:4px">…y ${neighbors.length - 12} más</div>` : ''}
        </div>
      </div>`;
    }

    detailBody.innerHTML = html;

    // Neighbor click → focus
    detailBody.querySelectorAll('.neighbor-chip').forEach(btn => {
      btn.onclick = () => {
        const targetNode = fg.graphData().nodes.find(n => n.id === btn.dataset.id);
        if (targetNode) {
          focusNode(targetNode);
          openDetail(targetNode);
        }
      };
    });

    detail.classList.add('open');
  }

  function focusNode(node) {
    const dist = 300;
    const { x, y, z } = node;
    fg.cameraPosition({ x: x + dist, y: y + dist / 2, z: z + dist }, { x, y, z }, 800);
  }

  fg.onNodeClick(node => {
    if (!node) return;
    openDetail(node);
    focusNode(node);
  });

  // Type visibility toggles
  document.querySelectorAll('.type-toggle').forEach(label => {
    const checkbox = label.querySelector('input');
    const type = label.dataset.type;
    checkbox.addEventListener('change', () => {
      if (checkbox.checked) {
        hiddenTypes.delete(type);
        label.classList.remove('dimmed');
      } else {
        hiddenTypes.add(type);
        label.classList.add('dimmed');
      }
      fg.nodeVisibility(n => !hiddenTypes.has(n.type));
      fg.linkVisibility(l => {
        const srcId = typeof l.source === 'object' ? l.source.id : l.source;
        const tgtId = typeof l.target === 'object' ? l.target.id : l.target;
        const src = fg.graphData().nodes.find(n => n.id === srcId);
        const tgt = fg.graphData().nodes.find(n => n.id === tgtId);
        return src && tgt && !hiddenTypes.has(src.type) && !hiddenTypes.has(tgt.type);
      });
    });
  });

  // Resize
  window.addEventListener('resize', () => {
    fg.width(window.innerWidth).height(window.innerHeight);
  });

  // Hide loader
  document.getElementById('loading').style.display = 'none';
})();
</script>
</body>
</html>
